name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and restart
        run: |
          docker compose up -d --build web
          docker compose exec -T web bin/rails db:migrate

      - name: Clean up old images
        run: docker image prune -f
