name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp /home/ashok/Travel-Planner-Backend/.env .env

      - name: Rebuild and restart
        run: docker compose build --no-cache && docker compose up -d --remove-orphans

      - name: Clean up old images
        if: always()
        run: docker image prune -f
